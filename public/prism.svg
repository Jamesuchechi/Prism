  <line x1="256" y1="400" x2="220" y2="490" stroke="#a89fc8" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="256" y1="400" x2="256" y2="492" stroke="#c8a96e" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="256" y1="400" x2="292" y2="490" stroke="#9bc49b" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <line x1="256" y1="400" x2="352" y2="480" stroke="#c9967e" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <!-- Input ray -->
  <line x1="256" y1="20" x2="256" y2="80" stroke="#c8a96e" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
</svg>
